version: "3.9"

services:

  ingestion:
    build: ./services/ingestion_service
    ports:
      - "8000:8000"

  retrieval:
    build: ./services/retrieval_service
    ports:
      - "8001:8001"
    depends_on:
      - ingestion

  rag:
    build: ./services/rag_service
    ports:
      - "8002:8002"
    depends_on:
      - retrieval

  frontend:
    build: ./frontend
    ports:
      - "8501:8501"
    depends_on:
      - rag